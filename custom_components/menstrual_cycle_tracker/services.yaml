log_period_start:
  name: Log Period Start
  description: >
    Log the start of a menstrual period. If you have multiple trackers,
    specify the tracker name to target the right person.
  fields:
    tracker:
      name: Tracker
      description: >
        Select the tracker to log to. Required when multiple trackers are
        configured; omit if you only have one.
      required: false
      selector:
        config_entry:
          integration: menstrual_cycle_tracker
    date:
      name: Date
      description: "Date the period started (in your configured date format). Defaults to today if omitted."
      required: false
      selector:
        date: {}

log_period_end:
  name: Log Period End
  description: >
    Log the end of a menstrual period. If you have multiple trackers,
    specify the tracker name to target the right person.
  fields:
    tracker:
      name: Tracker
      description: >
        Select the tracker to log to. Required when multiple trackers are
        configured; omit if you only have one.
      required: false
      selector:
        config_entry:
          integration: menstrual_cycle_tracker
    date:
      name: Date
      description: "Date the period ended (in your configured date format). Defaults to today if omitted."
      required: false
      selector:
        date: {}

log_symptom:
  name: Log Symptom
  description: >
    Log a symptom associated with the cycle. If you have multiple trackers,
    specify the tracker name to target the right person.
  fields:
    tracker:
      name: Tracker
      description: >
        Select the tracker to log to. Required when multiple trackers are
        configured; omit if you only have one.
      required: false
      selector:
        config_entry:
          integration: menstrual_cycle_tracker
    symptom:
      name: Symptom
      description: Name of the symptom (e.g. cramps, headache, fatigue).
      required: true
      selector:
        select:
          translation_key: symptom_name
          custom_value: true
          options:
            - cramps
            - headache
            - fatigue
            - bloating
            - mood_swings
            - temperature_sensitivity
    severity:
      name: Severity
      description: Severity of the symptom.
      required: false
      selector:
        select:
          translation_key: severity
          options:
            - "mild"
            - "moderate"
            - "severe"
            - "very_cold"
            - "slightly_cold"
            - "normal"
            - "slightly_warm"
            - "very_hot"
    date:
      name: Date
      description: "Date of the symptom (in your configured date format). Defaults to today if omitted."
      required: false
      selector:
        date: {}

edit_cycle:
  name: Edit Cycle
  description: >
    Edit an existing cycle's start or end date. Identify the cycle by its
    current start date, then provide the new values.
  fields:
    tracker:
      name: Tracker
      description: >
        Select the tracker. Required when multiple trackers are configured.
      required: false
      selector:
        config_entry:
          integration: menstrual_cycle_tracker
    original_start_date:
      name: Original Start Date
      description: "The current start date of the cycle to edit (in your configured date format)."
      required: true
      selector:
        date:
    new_start_date:
      name: New Start Date
      description: "New start date for the cycle (in your configured date format). Leave blank to keep unchanged."
      required: false
      selector:
        date:
    new_end_date:
      name: New End Date
      description: "New end date for the cycle (in your configured date format). Leave blank to keep unchanged."
      required: false
      selector:
        date: {}

delete_cycle:
  name: Delete Cycle
  description: >
    Delete an existing cycle. Identify the cycle by its start date.
  fields:
    tracker:
      name: Tracker
      description: >
        Select the tracker. Required when multiple trackers are configured.
      required: false
      selector:
        config_entry:
          integration: menstrual_cycle_tracker
    start_date:
      name: Start Date
      description: "The start date of the cycle to delete (in your configured date format)."
      required: true
      selector:
        date: {}

delete_symptom:
  name: Delete Symptom
  description: >
    Delete a logged symptom. Identify it by date and symptom name.
    If multiple entries match, the first one is removed.
  fields:
    tracker:
      name: Tracker
      description: >
        Select the tracker. Required when multiple trackers are configured.
      required: false
      selector:
        config_entry:
          integration: menstrual_cycle_tracker
    date:
      name: Date
      description: "The date the symptom was logged (in your configured date format)."
      required: true
      selector:
        date:
    symptom:
      name: Symptom
      description: "The name of the symptom to delete (must match exactly)."
      required: true
      selector:
        select:
          translation_key: symptom_name
          custom_value: true
          options:
            - cramps
            - headache
            - fatigue
            - bloating
            - mood_swings
            - temperature_sensitivity
